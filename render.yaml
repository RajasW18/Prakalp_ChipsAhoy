services:
  # Backend Web Service
  - type: web
    name: ppg-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run db:generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ppg-frontend # Link to frontend
          property: host
      - key: DATABASE_URL
        sync: false # Set via Render dashboard (Neon / Supabase etc)
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: TOTP_ENCRYPTION_KEY
        generateValue: true
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # Frontend Web Service
  - type: web
    name: ppg-dashboard
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ppg-backend
          property: host
